<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Inventory & Transaction Management System - Admin Dashboard">
  <title>Inventory Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon"><i class="bx bx-cube-alt"></i></div>
        <span class="logo-text">InvenPro</span>
      </div>
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
        <i class="bx bx-menu"></i>
      </button>
    </div>

    <nav class="sidebar-nav">
      <a href="#/" class="nav-item active" data-page="dashboard">
        <i class="bx bx-grid-alt"></i>
        <span>Dashboard</span>
      </a>
      <a href="#/items" class="nav-item" data-page="items">
        <i class="bx bx-package"></i>
        <span>Items</span>
      </a>
      <a href="#/sets" class="nav-item" data-page="sets">
        <i class="bx bx-collection"></i>
        <span>Sets</span>
      </a>
      <a href="#/transactions" class="nav-item" data-page="transactions">
        <i class="bx bx-receipt"></i>
        <span>Transaksi</span>
      </a>
      <a href="#/joki" class="nav-item" data-page="joki">
        <i class="bx bx-joystick"></i>
        <span>Joki</span>
      </a>
      <a href="#/products" class="nav-item" data-page="products">
        <i class="bx bx-list-ul"></i>
        <span>List Produk</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-footer-text">
        <span class="version">v1.0.0</span>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content" id="mainContent">
    <div class="content-wrapper" id="content">
      <!-- Pages rendered here -->
    </div>
  </main>

  <!-- Modal Container -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle"></h3>
        <button class="modal-close" id="modalClose" aria-label="Close modal"><i class="bx bx-x"></i></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/pages/dashboard.js"></script>
  <script src="/js/pages/items.js"></script>
  <script src="/js/pages/sets.js"></script>
  <script src="/js/pages/transactions.js"></script>
  <script src="/js/pages/joki.js"></script>
  <script src="/js/pages/product-list.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
